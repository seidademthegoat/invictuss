<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INVICTUS</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
    background:#000;
    overflow:hidden;
    color:white;
}

/* 🌌 animated energy background */
.background{
    position:absolute;
    width:100%;
    height:100%;
    background: radial-gradient(circle at center, rgba(255,215,0,0.15), transparent 40%),
                radial-gradient(circle at 20% 20%, rgba(0,255,255,0.1), transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255,0,150,0.1), transparent 50%);
    animation: move 8s infinite alternate;
}

@keyframes move{
    0%{transform:scale(1) rotate(0deg);}
    100%{transform:scale(1.2) rotate(10deg);}
}

/* 🔥 main layout */
.container{
    position:relative;
    z-index:2;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

/* 👑 logo */
.logo{
    width:160px;
    margin-bottom:15px;
    filter: drop-shadow(0 0 20px gold);
    animation: float 3s ease-in-out infinite;
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-12px);}
}

/* 🔥 title */
h1{
    font-size:50px;
    letter-spacing:8px;
    color:gold;
    text-shadow:0 0 25px gold;
}

/* 💀 subtitle */
p{
    opacity:0.7;
    margin-top:10px;
    letter-spacing:2px;
}

/* ⚡ glass panel */
.panel{
    margin-top:25px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    max-width:500px;
}

/* 🧊 cards */
.card{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    padding:12px;
    border-radius:12px;
    transition:0.3s;
    cursor:pointer;
}

.card:hover{
    transform:scale(1.08);
    background:rgba(255,215,0,0.15);
    box-shadow:0 0 20px gold;
}

/* ✨ footer */
footer{
    position:absolute;
    bottom:15px;
    font-size:11px;
    opacity:0.5;
    letter-spacing:3px;
}
</style>

</head>
<body>

<div class="background"></div>

<div class="container">

    <!-- 🔥 YOUR LOGO -->
    <img class="logo" src="invictus.png">

    <h1>INVICTUS</h1>
    <p>ELITE TEAM • DIGITAL LEGENDS</p>

    <div class="panel">
        <div class="card">1. Amar Bahredin</div>
        <div class="card">2. Seid Adem</div>
        <div class="card">3. Sead Jemal</div>
        <div class="card">4. Huzeyfa Akmel</div>
        <div class="card">5. Bilal Mohammed</div>
        <div class="card">6. Namis Kemal</div>
        <div class="card">7. Arafat Alhindi</div>
        <div class="card">8. Welid Ahmed</div>
    </div>

</div>

<footer>SCAN • ENTER • DOMINATE</footer>

</body>
</html>
